name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v0.4: pinned 22.11.0 cell as a canary for V8 fdlibm Math.exp
        # drift within Node 22.x minor bumps. The Math.exp(-0.5) constant
        # test fires on every cell; observing the fixed 22.11.0 reference
        # alongside the moving 22.x target is the early-warning siren.
        node: ['22.x', '22.11.0']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'
      - run: pnpm build

  byte-equal:
    name: byte-equal vs golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'
      - name: verify mazur.generated.jsonl matches golden
        shell: bash
        run: |
          if [ -f tmp/mazur.generated.jsonl ]; then
            diff fixtures/mazur.golden.jsonl tmp/mazur.generated.jsonl
          else
            echo "tmp/mazur.generated.jsonl not produced by test suite; skipping diff" >&2
          fi
