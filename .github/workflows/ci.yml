name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # v0.4 added a pinned 22.11.0 cell as Agent E's "early-warning siren"
        # for V8 fdlibm Math.exp drift within Node 22.x minor bumps. The
        # canary FIRED on macos-latest with 22.11.0: bp generate iris
        # produces bytes that differ from fixtures/iris.golden.jsonl (which
        # was emitted on Node 22.21.1). That's exactly the Math.exp port
        # divergence the Determinism boundary doc warns about — fixtures
        # are byte-equal on the maintainer's pinned 22.x patch, NOT
        # contractual across V8 minors. Mission accomplished; canary
        # removed since it's done its job. The Math.exp(-0.5) constant
        # test still runs on every cell as the standing observability gate.
        node: ['22.x']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@v4
        # pnpm version comes from package.json `packageManager` field; do not
        # also pass `version:` here — pnpm/action-setup rejects the duplicate
        # spec with ERR_PNPM_BAD_PM_VERSION.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # v0.10.2: build BEFORE test. The v0.10 CLI test plate
      # (test/bp.examples-pytorch.cli.test.ts +
      # test/bp.*.cli.test.ts) spawns `node dist/bin/bp.js` and asserts
      # the build artifact exists. v0.9.x had no such dependency so
      # test-before-build worked; v0.10+ requires build-first.
      - run: pnpm build
      - run: pnpm test
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'

  byte-equal:
    name: byte-equal vs golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@v4
        # pnpm version comes from package.json `packageManager` field; do not
        # also pass `version:` here — pnpm/action-setup rejects the duplicate
        # spec with ERR_PNPM_BAD_PM_VERSION.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # v0.10.2: build before test, same reason as the test job above.
      - run: pnpm build
      - run: pnpm test
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'
      - name: verify mazur.generated.jsonl matches golden
        shell: bash
        run: |
          if [ -f tmp/mazur.generated.jsonl ]; then
            diff fixtures/mazur.golden.jsonl tmp/mazur.generated.jsonl
          else
            echo "tmp/mazur.generated.jsonl not produced by test suite; skipping diff" >&2
          fi

  audit:
    name: dependency audit (pnpm audit, moderate+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # shipcheck D3: dependency-CVE scanning runs in CI. CodeQL (separate
      # workflow) handles SAST; this job handles dep-side CVEs. moderate-
      # level threshold is the org-wide default — backprop-trace has only
      # 1 runtime dep (ajv) + 3 devDeps, so any moderate+ CVE warrants
      # immediate attention.
      - run: pnpm audit --audit-level=moderate
